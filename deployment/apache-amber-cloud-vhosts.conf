    ProxyPass /api/ http://147.93.56.67:5595/api/
    ProxyPassReverse /api/ http://147.93.56.67:5595/api/

    ProxyPass /waiter/ http://147.93.56.67:5595/waiter/
    ProxyPassReverse /waiter/ http://147.93.56.67:5595/waiter/
</VirtualHost>

###############################################################################
