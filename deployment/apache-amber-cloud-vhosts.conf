# Apache vhost config pentru Restaurant QR Ordering System
#
# Ce face acest fisier:
# - redirecteaza HTTP -> HTTPS
# - redirecteaza radacina fiecarui subdomeniu catre ruta corecta:
#   - admin.amber-cloud.vip/    -> /admin/
#   - waiter.amber-cloud.vip/   -> /waiter/
#   - kitchen.amber-cloud.vip/  -> /kitchen/
#   - menu.amber-cloud.vip/     -> /meniu/
# - proxyeaza corect:
#   - /assets/  -> fisierele CSS/JS generate de Vite
#   - /api/     -> API-ul Express
#   - /admin/   -> panou admin
#   - /waiter/  -> panou ospatar
#   - /kitchen/ -> panou bucatarie
#   - /meniu/ -> meniul public
#
# IMPORTANT:
# 1. Aplicatia ta decide panoul dupa PATH, nu dupa hostname.
#    De aceea trebuie sa pastrezi /admin, /waiter, /kitchen in URL.
# 2. Nu folosi ProxyPass / -> http://IP:PORT/admin/
#    Asta rupe CSS-ul si request-urile /api/.
# 3. Daca folosesti certificat wildcard sau SAN, poti lasa aceleasi cai de certificat
#    pe toate vhost-urile. Daca nu, inlocuieste fiecare cale cu certificatul domeniului lui.
#
# URL bun pentru meniul public:
#   https://menu.amber-cloud.vip/meniu?table=1
#   https://menu.amber-cloud.vip/meniu?table=2
#
# Observatie:
#   Masa este transmisa prin query param-ul ?table=
#   Nu este suficient doar /meniu/ daca vrei sesiune legata de masa.
#
# Module necesare:
#   a2enmod ssl proxy proxy_http rewrite headers
#
# Dupa salvare:
#   apachectl configtest
#   systemctl reload apache2

<IfModule mod_ssl.c>

###############################################################################
# ADMIN - port 80
###############################################################################
<VirtualHost *:80>
    ServerName admin.amber-cloud.vip

    RewriteEngine On
    RewriteRule ^/$ https://admin.amber-cloud.vip/admin/ [R=301,L]
    RewriteRule ^/(.*)$ https://admin.amber-cloud.vip/$1 [R=301,L]
</VirtualHost>

###############################################################################
# WAITER - port 80
###############################################################################
<VirtualHost *:80>
    ServerName waiter.amber-cloud.vip

    RewriteEngine On
    RewriteRule ^/$ https://waiter.amber-cloud.vip/waiter/ [R=301,L]
    RewriteRule ^/(.*)$ https://waiter.amber-cloud.vip/$1 [R=301,L]
</VirtualHost>

###############################################################################
# KITCHEN - port 80
###############################################################################
<VirtualHost *:80>
    ServerName kitchen.amber-cloud.vip

    RewriteEngine On
    RewriteRule ^/$ https://kitchen.amber-cloud.vip/kitchen/ [R=301,L]
    RewriteRule ^/(.*)$ https://kitchen.amber-cloud.vip/$1 [R=301,L]
</VirtualHost>

###############################################################################
# MENU PUBLIC - port 80
###############################################################################
<VirtualHost *:80>
    ServerName menu.amber-cloud.vip

    RewriteEngine On
    RewriteRule ^/$ https://menu.amber-cloud.vip/meniu/ [R=301,L]
    RewriteRule ^/(.*)$ https://menu.amber-cloud.vip/$1 [R=301,L]
</VirtualHost>

###############################################################################
# ADMIN - port 443
###############################################################################
<VirtualHost *:443>
    ServerName admin.amber-cloud.vip

    Include /etc/letsencrypt/options-ssl-apache.conf
    SSLCertificateFile /etc/letsencrypt/live/admin.amber-cloud.vip/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/admin.amber-cloud.vip/privkey.pem

    ProxyPreserveHost On
    SSLProxyEngine On
    ProxyTimeout 600

    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Port "443"

    RewriteEngine On
    RewriteRule ^/$ /admin/ [R=302,L]

    ProxyPass /assets/ http://147.93.56.67:5595/assets/
    ProxyPassReverse /assets/ http://147.93.56.67:5595/assets/

    ProxyPass /api/realtime http://147.93.56.67:5595/api/realtime retry=0 timeout=600 keepalive=On
    ProxyPassReverse /api/realtime http://147.93.56.67:5595/api/realtime

    ProxyPass /api/ http://147.93.56.67:5595/api/
    ProxyPassReverse /api/ http://147.93.56.67:5595/api/

    ProxyPass /admin/ http://147.93.56.67:5595/admin/
    ProxyPassReverse /admin/ http://147.93.56.67:5595/admin/
</VirtualHost>

###############################################################################
# WAITER - port 443
###############################################################################
<VirtualHost *:443>
    ServerName waiter.amber-cloud.vip

    Include /etc/letsencrypt/options-ssl-apache.conf
    SSLCertificateFile /etc/letsencrypt/live/waiter.amber-cloud.vip/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/waiter.amber-cloud.vip/privkey.pem

    ProxyPreserveHost On
