# Apache vhost pentru un singur domeniu, cu rute pe acelasi host:
#
#   https://domeniul-tau.ro/meniu?table=1
#   https://domeniul-tau.ro/admin
#   https://domeniul-tau.ro/waiter
#   https://domeniul-tau.ro/kitchen
#
# Aplicatia suporta acum:
# - /meniu      -> meniu public
# - /customer   -> alias vechi, inca functional
# - /admin
# - /waiter
# - /kitchen
# - /bucatarie  -> alias pentru kitchen
#
# IMPORTANT:
# 1. Inlocuieste amber-cloud.vip cu domeniul tau real.
# 2. Inlocuieste caile SSL cu certificatele tale reale.
# 3. Daca folosesti wildcard sau SAN, poti lasa acelasi certificat.
#
# Module necesare:
#   a2enmod ssl proxy proxy_http rewrite headers
#
# Dupa activare:
#   apachectl configtest
#   systemctl reload apache2

<IfModule mod_ssl.c>

###############################################################################
# HTTP -> HTTPS
###############################################################################
<VirtualHost *:80>
    ServerName amber-cloud.vip
    ServerAlias www.amber-cloud.vip

    RewriteEngine On
    RewriteRule ^/(.*)$ https://amber-cloud.vip/$1 [R=301,L]
</VirtualHost>

###############################################################################
# HTTPS - toate rutele pe acelasi domeniu
###############################################################################
<VirtualHost *:443>
    ServerName amber-cloud.vip
    ServerAlias www.amber-cloud.vip

    Include /etc/letsencrypt/options-ssl-apache.conf
    SSLCertificateFile /etc/letsencrypt/live/amber-cloud.vip/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/amber-cloud.vip/privkey.pem

    ProxyPreserveHost On
    SSLProxyEngine On
    ProxyTimeout 600

    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Port "443"

    RewriteEngine On

    # Optional: daca cineva intra pe radacina domeniului, il ducem la meniu public
    # Daca preferi pagina home/login interna pe /, comenteaza linia urmatoare.
    RewriteRule ^/$ /meniu [R=302,L]

    # Active statice Vite
    ProxyPass /assets/ http://127.0.0.1:5595/assets/
    ProxyPassReverse /assets/ http://127.0.0.1:5595/assets/

    # API + realtime
    ProxyPass /api/realtime http://127.0.0.1:5595/api/realtime retry=0 timeout=600 keepalive=On
    ProxyPassReverse /api/realtime http://127.0.0.1:5595/api/realtime

    ProxyPass /api/ http://127.0.0.1:5595/api/
    ProxyPassReverse /api/ http://127.0.0.1:5595/api/

    # Toata aplicatia SPA
    ProxyPass / http://127.0.0.1:5595/
    ProxyPassReverse / http://127.0.0.1:5595/
</VirtualHost>

</IfModule>
